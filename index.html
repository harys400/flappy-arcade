<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Arcade Premium</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Réglage dynamique de la taille
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        // Variables de jeu
        let bird = { x: 50, y: canvas.height/2, v: 0, gravity: 0.6, jump: -8 };
        let pipes = [];
        let score = 0;
        let gameActive = true;

        function spawnPipe() {
            let gap = 200;
            let minH = 50;
            let h = Math.random() * (canvas.height - gap - 2 * minH) + minH;
            pipes.push({ x: canvas.width, h: h });
        }

        function jump() {
            if(!gameActive) {
                bird.y = canvas.height/2; bird.v = 0; pipes = []; score = 0; gameActive = true;
            } else {
                bird.v = bird.jump;
            }
        }

        // Contrôles tactiles et clavier
        window.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, { passive: false });
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });

        function loop() {
            if (gameActive) {
                bird.v += bird.gravity;
                bird.y += bird.v;
                if (pipes.length === 0 || pipes[pipes.length-1].x < canvas.width - 300) spawnPipe();
                
                pipes.forEach((p, i) => {
                    p.x -= 3;
                    if (p.x + 50 < bird.x && !p.passed) { score++; p.passed = true; }
                    if (p.x < -50) pipes.splice(i, 1);
                    if (bird.x > p.x && bird.x < p.x + 50 && (bird.y < p.h || bird.y > p.h + 200)) gameActive = false;
                });
                if (bird.y > canvas.height || bird.y < 0) gameActive = false;
            }

            // Dessin
            ctx.fillStyle = '#70c5ce'; ctx.fillRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = '#f00'; ctx.beginPath(); ctx.arc(bird.x, bird.y, 20, 0, Math.PI*2); ctx.fill();
            pipes.forEach(p => { ctx.fillStyle = '#2ecc71'; ctx.fillRect(p.x, 0, 50, p.h); ctx.fillRect(p.x, p.h + 200, 50, canvas.height); });
            ctx.fillStyle = '#fff'; ctx.font = '30px Arial'; ctx.fillText('Score: ' + score, 20, 50);
            
            if(!gameActive) ctx.fillText('TAP TO RESTART', canvas.width/2 - 100, canvas.height/2);
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
